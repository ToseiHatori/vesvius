services:
  vesuvius-eval:
    build:
      context: .
      dockerfile: Dockerfile
    image: vesuvius-eval:latest
    container_name: vesuvius-eval
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - KERAS_BACKEND=jax
    volumes:
      # Mount model weights file directly from parent directory
      - ../model.weights.h5:/workspace/models/model.weights.h5:ro
      # Mount validation data (TFRecords)
      - ./tfrecords:/workspace/tfrecords:ro
      # Mount output directory
      - ./output:/workspace/output
    working_dir: /workspace
    command: >
      python evaluate.py
      --weights /workspace/models/model.weights.h5
      --tfrecords /workspace/tfrecords
      --output /workspace/output/results.json
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
