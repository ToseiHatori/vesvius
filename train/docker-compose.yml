services:
  vesuvius-train:
    build:
      context: ..
      dockerfile: train/Dockerfile
    image: vesuvius-train:latest
    container_name: vesuvius-train
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - KERAS_BACKEND=torch
      - NCCL_DEBUG=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount TFRecords (read-only)
      - ../eval/tfrecords:/workspace/tfrecords:ro
      # Mount output directory (deprecated, use experiments)
      - ./output:/workspace/output
      # Mount experiments directory
      - ./experiments:/workspace/experiments
      # Mount training script (for development)
      - ./train.py:/workspace/train.py:ro
      # Mount configs (for development)
      - ./configs:/workspace/configs:ro
    working_dir: /workspace
    ipc: host  # Required for PyTorch multi-GPU
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]
